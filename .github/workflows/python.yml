name: Python CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  run-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Display Python version
        run: python --version

      - name: Run all Python files
        shell: bash
        run: |
          find Day01 \
            -type f \
            -name "*.py" \
            -print0 |
          while IFS= read -r -d '' file; do
            echo "========================================"
            echo "Running: $file"
            python "$file"
          done