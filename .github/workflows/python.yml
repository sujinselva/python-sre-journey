name: Python CI with AI Analysis

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  run-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: Run all learning Python files
        id: run_python
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail

          find Day01 Projects Challenges \
            -type f \
            -name "*.py" \
            -print0 |
          while IFS= read -r -d '' file; do
            echo "========================================"
            echo "Running: $file"
            python "$file"
          done 2>&1 | tee python-errors.log

      - name: Analyze Python failure with AI
        if: steps.run_python.outcome == 'failure'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/analyze_failure.py

      - name: Mark workflow as failed
        if: steps.run_python.outcome == 'failure'
        run: exit 1