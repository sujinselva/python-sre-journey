name: Python CI with Groq Analysis

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  run-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Display Python version
        run: python --version

      - name: Install Groq SDK
        run: python -m pip install groq

      - name: Run all Python files
        id: run_python
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail

          find Day01 \
            -type f \
            -name "*.py" \
            -print0 |
          while IFS= read -r -d '' file; do
            echo "========================================"
            echo "Running: $file"

            if ! python "$file"; then
              echo "FAILED: $file"
              exit 1
            fi
          done 2>&1 | tee python-errors.log

      - name: Analyze failure with Groq
        if: steps.run_python.outcome == 'failure'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/analyze_failure.py

      - name: Mark workflow as failed
        if: steps.run_python.outcome == 'failure'
        run: exit 1